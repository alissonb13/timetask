services:
  # ─── API (Node.js Web Service) ───────────────────────────────────────────────
  - type: web
    name: timetask-api
    runtime: node
    plan: starter # persistent disk requires starter plan or higher
    buildCommand: npm ci && npm run build -w api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
      - key: CORS_ORIGIN
        value: https://timetask-web.onrender.com # update if you rename timetask-web
    disk:
      name: timetask-db
      mountPath: /data
      sizeGB: 1

  # ─── Web (Static Site) ───────────────────────────────────────────────────────
  - type: web
    name: timetask-web
    runtime: static
    buildCommand: npm ci && npm run build -w web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://timetask-api.onrender.com # update if you rename timetask-api
